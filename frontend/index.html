<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Python Code Executor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        h1 {
            font-size: 2.5em;
            color: #00d4ff;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .subtitle {
            color: #888;
            font-size: 1.1em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: #2a2a3e;
            border: 1px solid #3a3a50;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .panel-title {
            font-size: 1.2em;
            color: #00d4ff;
            margin-bottom: 15px;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 300px;
            background: #1e1e2e;
            color: #e0e0e0;
            border: 1px solid #3a3a50;
            border-radius: 4px;
            padding: 12px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            line-height: 1.5;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .clear-btn {
            background: linear-gradient(135deg, #666 0%, #444 100%);
        }

        .clear-btn:hover {
            box-shadow: 0 4px 12px rgba(100, 100, 100, 0.4);
        }

        .output-container {
            height: 300px;
            overflow-y: auto;
            background: #1e1e2e;
            border: 1px solid #3a3a50;
            border-radius: 4px;
            padding: 12px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .output-container::-webkit-scrollbar {
            width: 8px;
        }

        .output-container::-webkit-scrollbar-track {
            background: #2a2a3e;
        }

        .output-container::-webkit-scrollbar-thumb {
            background: #3a3a50;
            border-radius: 4px;
        }

        .output-container::-webkit-scrollbar-thumb:hover {
            background: #4a4a60;
        }

        .stdout {
            color: #00ff00;
        }

        .stderr {
            color: #ff6b6b;
        }

        .empty-output {
            color: #666;
            font-style: italic;
        }

        .execution-time {
            color: #888;
            font-size: 0.9em;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #3a3a50;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #00d4ff;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #3a3a50;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-box {
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid #00d4ff;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.95em;
            color: #b0e0ff;
        }

        .info-box strong {
            color: #00d4ff;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            textarea,
            .output-container {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐍 Secure Python Executor</h1>
            <p class="subtitle">Run Python code safely in an isolated Docker sandbox</p>
        </header>

        <div class="info-box">
            <strong>⚠️ Sandbox Environment:</strong> Your code runs in a restricted Docker container with network access disabled and strict resource limits.
        </div>

        <div class="main-content">
            <div class="panel">
                <div class="panel-title">📝 Python Code</div>
                <textarea id="codeInput" placeholder="Enter your Python code here...">print("Hello, World!")
print("Welcome to Secure Python Executor")

# Try some Python:
x = 5
y = 10
print(f"Sum: {x + y}")
</textarea>
                <div class="button-group">
                    <button id="runBtn" onclick="executeCode()">▶ Run Code</button>
                    <button class="clear-btn" onclick="clearCode()">🗑 Clear</button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">📤 Output</div>
                <div class="loading" id="loading">
                    <span class="spinner"></span>
                    <span>Running code...</span>
                </div>
                <div class="output-container" id="output">
                    <span class="empty-output">Output will appear here...</span>
                </div>
                <div class="execution-time" id="executionTime"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/execute';

        async function executeCode() {
            const code = document.getElementById('codeInput').value;
            const outputDiv = document.getElementById('output');
            const loading = document.getElementById('loading');
            const runBtn = document.getElementById('runBtn');
            const executionTimeDiv = document.getElementById('executionTime');

            // Validation
            if (!code.trim()) {
                outputDiv.innerHTML = '<span class="stderr">Error: Code cannot be empty</span>';
                return;
            }

            if (code.length > 2000) {
                outputDiv.innerHTML = '<span class="stderr">Error: Code exceeds 2000 character limit</span>';
                return;
            }

            // Show loading state
            loading.classList.add('active');
            outputDiv.innerHTML = '';
            executionTimeDiv.innerHTML = '';
            runBtn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ code: code })
                });

                if (!response.ok) {
                    const error = await response.json();
                    outputDiv.innerHTML = `<span class="stderr">Error: ${error.detail}</span>`;
                    loading.classList.remove('active');
                    runBtn.disabled = false;
                    return;
                }

                const result = await response.json();

                // Display output
                let output = '';
                if (result.output) {
                    output += `<span class="stdout">${escapeHtml(result.output)}</span>`;
                }
                if (result.error) {
                    if (output) output += '\n';
                    output += `<span class="stderr">${escapeHtml(result.error)}</span>`;
                }

                if (!output) {
                    output = '<span class="empty-output">No output produced</span>';
                }

                outputDiv.innerHTML = output;
                executionTimeDiv.innerHTML = `⏱️ Execution time: ${result.execution_time_ms.toFixed(2)}ms`;

            } catch (error) {
                outputDiv.innerHTML = `<span class="stderr">Network error: ${error.message}</span>`;
            } finally {
                loading.classList.remove('active');
                runBtn.disabled = false;
            }
        }

        function clearCode() {
            document.getElementById('codeInput').value = '';
            document.getElementById('output').innerHTML = '<span class="empty-output">Output will appear here...</span>';
            document.getElementById('executionTime').innerHTML = '';
            document.getElementById('codeInput').focus();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow Ctrl+Enter to run code
        document.getElementById('codeInput').addEventListener('keydown', function(event) {
            if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
                event.preventDefault();
                executeCode();
            }
        });

        // Focus on textarea when page loads
        window.addEventListener('load', function() {
            document.getElementById('codeInput').focus();
        });
    </script>
</body>
</html>
